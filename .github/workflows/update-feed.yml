name: Update VS Mod DB RSS Feed

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  # Allow manual trigger from GitHub UI
  workflow_dispatch:

concurrency:
  group: rss-feed-update
  cancel-in-progress: false

jobs:
  update-feed:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run RSS generator
        run: python ./vsmoddb_rss.py

      - name: Commit and push if changed
        run: |
          git config user.name "Ruyeex"
          git config user.email "ruyeex@gmail.com"
          git add vsmoddb_updates.xml
          # Only commit if there are changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update VS Mod DB RSS feed" && git pull --rebase && git push)
