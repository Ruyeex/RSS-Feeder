name: Update VS Mod DB RSS Feed

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  # Allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  update-feed:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Locate and run generator
        run: |
          echo "PWD: $(pwd)"
          ls -la
          if [ -f "./vsmoddb_rss.py" ]; then
            python ./vsmoddb_rss.py
          else
            echo "Error: vsmoddb_rss.py not found in current directory"
            find . -name 'vsmoddb_rss.py' -type f
            exit 1
          fi
      - name: Commit and push if changed
        run: |
          git config user.name "Ruyeex"
          git config user.email "ruyeex@gmail.com"
          git add vsmoddb_updates.xml
          # Only commit if there are changes
          if ! git diff --quiet && ! git diff --staged --quiet; then
            git commit -m "Update VS Mod DB RSS feed"
            git pull --rebase origin main
            git push origin main
          fi
