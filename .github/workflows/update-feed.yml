name: Update VS Mod DB RSS Feed

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  # Allow manual trigger from GitHub UI
  workflow_dispatch:

concurrency:
  group: rss-feed-update
  cancel-in-progress: false

jobs:
  update-feed:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run RSS generator
        run: python ./vsmoddb_rss.py

      - name: Commit and push if changed
        run: |
          git config user.name "Ruyeex"
          git config user.email "ruyeex@gmail.com"
          git add vsmoddb_updates.xml
          
          # Only commit and push if there are changes
          if ! git diff --quiet || ! git diff --staged --quiet; then
            git commit -m "Update VS Mod DB RSS feed"
            
            # Fetch latest changes first
            git fetch origin main
            
            # Rebase on latest main to avoid conflicts
            git rebase origin/main || {
              echo "Rebase failed - aborting"
              git rebase --abort
              exit 1
            }
            
            # Now push
            git push origin main
          else
            echo "No changes to commit"
          fi
