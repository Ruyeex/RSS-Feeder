name: Update VS Mod DB RSS Feed

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update-feed:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Locate and run generator
        run: |
          echo "Working dir: $(pwd)"
          python --version
          echo "Top-level contents:"
          ls -la

          # Find the script (stop at first match)
          script="$(find . -maxdepth 6 -type f -name 'vsmoddb_rss.py' -print -quit)"
          echo "Found script: $script"
          if [ -z "$script" ]; then
            echo "Error: vsmoddb_rss.py not found in repository (searched up to 6 levels)."
            echo "Repository contents:"
            find . -maxdepth 4 -type f -printf '%p\n' || true
            exit 1
          fi

          # Run the script
          python "$script"

      - name: Commit and push if changed
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -A
          # If no staged changes, exit successfully
          git diff --cached --quiet && echo "No changes to commit." && exit 0
          git commit -m "Update VS Mod DB RSS feed"
          git push
